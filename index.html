<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churrasqueira do Rama</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f0f0f;
  color: white;
}

/* HEADER */
header {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

header div {
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 15px;
}

header h1 {
  font-size: 3rem;
}

header p {
  margin-top: 10px;
  opacity: 0.8;
}

.btn {
  margin-top: 20px;
  display: inline-block;
  padding: 12px 25px;
  background: #ff4d00;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* SECTIONS */
section {
  padding: 60px 20px;
  text-align: center;
}

h2 {
  margin-bottom: 30px;
}

/* MENU */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.price {
  color: #ff4d00;
  font-weight: bold;
}

/* CONTACT */
.contact {
  background: #141414;
}

/* STATUS */
#status {
  font-weight: bold;
  margin-bottom: 15px;
}

/* FOOTER */
footer {
  padding: 20px;
  text-align: center;
  background: black;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>🔥 Churrasqueira do Rama</h1>
    <p>O melhor sabor direto para ti</p>
    <a href="#menu" class="btn">Ver Menu</a>
  </div>
</header>

<!-- MENU -->
<section id="menu">
  <h2>🍗 Menu</h2>

  <div class="menu">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908811549-52b9a4c7b7c5?auto=format&fit=crop&w=800&q=80">
      <div class="card-content">
        <h3>Frango Assado</h3>
        <p class="price">12.50€</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1555992336-03a23c2a6f7d?auto=format&fit=crop&w=800&q=80">
      <div class="card-content">
        <h3>Entrecosto</h3>
        <p class="price">13.50€</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=800&q=80">
      <div class="card-content">
        <h3>Costeletas</h3>
        <p class="price">15€</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1606756790138-261d2b21cd88?auto=format&fit=crop&w=800&q=80">
      <div class="card-content">
        <h3>Salsichas</h3>
        <p class="price">8€</p>
      </div>
    </div>

  </div>
</section>

<!-- LOCALIZAÇÃO -->
<section class="contact">
  <h2>📍 Onde Estamos</h2>
  <p>Alpiarça, Santarém</p>
  <p>📞 926508612</p>
</section>

<!-- HORÁRIO -->
<section class="contact">
  <h2>🕒 Horário</h2>

  <p id="status"></p>

  <p>Seg - Sáb: 11:00 - 22:00</p>
  <p>Domingo: Fechado</p>
</section>

<footer>
  <p>© 2026 Churrasqueira do Rama</p>
</footer>

<script>
function checkOpen() {
  const now = new Date();
  const day = now.getDay();
  const hour = now.getHours();
  const status = document.getElementById("status");

  if (day === 0) {
    status.innerHTML = "🔴 Fechado hoje";
    status.style.color = "red";
    return;
  }

  if (hour >= 11 && hour < 22) {
    status.innerHTML = "🟢 Aberto agora — fecha às 22:00";
    status.style.color = "lightgreen";
  } else {
    status.innerHTML = "🔴 Fechado — abre às 11:00";
    status.style.color = "red";
  }
}

checkOpen();
</script>

</body>
</html>
